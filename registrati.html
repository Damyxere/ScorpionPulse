<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Pulse - Registrazione</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #09090b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            background: #141417;
            padding: 32px;
            border-radius: 12px;
            border: 1px solid #27272a;
            width: 100%;
            max-width: 400px;
        }
        h2 { margin-bottom: 24px; font-weight: 700; text-align: center; }
        h2 span { color: #ff2a2a; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #a1a1aa; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
        }
        input:focus { border-color: #ff2a2a; outline: none; }
        button {
            width: 100%;
            padding: 12px;
            background: #ff2a2a;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
        .error-msg { color: #ff2a2a; font-size: 0.85rem; margin-top: 10px; text-align: center; display: none; }
        p { text-align: center; color: #a1a1aa; margin-top: 20px; font-size: 0.9rem; }
        a { color: #ff2a2a; text-decoration: none; font-weight: 600; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>

    <div class="auth-container">
        <h2>🦂 Scorpion<span>Pulse</span></h2>
        <form id="register-form">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required autocomplete="email">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="new-password">
            </div>
            <button type="submit">Crea Account</button>
            <div class="error-msg" id="error-message"></div>
        </form>
        <p>Hai già un account? <a href="login.html">Accedi qui</a></p>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            errorDiv.style.display = "none";

            window.auth.createUserWithEmailAndPassword(email, password)
                .then(() => {
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    errorDiv.innerText = error.message;
                    errorDiv.style.display = "block";
                });
        });
    </script>
</body>
</html>
