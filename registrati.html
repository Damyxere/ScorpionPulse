<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Pulse - Registrati</title>
    <style>
        :root {
            --bg-color: #070708;
            --card-bg: #121214;
            --primary: #ff2a2a;
            --primary-hover: #cc0000;
            --border: #222226;
            --text-muted: #888893;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at top right, rgba(255, 42, 42, 0.05), transparent 40%);
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        .auth-card { 
            background: var(--card-bg); 
            padding: 40px 30px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            box-sizing: border-box; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .brand { 
            font-size: 2.2rem; 
            font-weight: 900; 
            margin-bottom: 5px; 
            background: linear-gradient(45deg, #ff2a2a, #ff7300); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            background: #070708; 
            color: white; 
            box-sizing: border-box; 
            font-size: 1rem; 
            transition: all 0.2s ease;
        }

        input:focus { 
            border-color: var(--primary); 
            outline: none; 
            box-shadow: 0 0 10px rgba(255, 42, 42, 0.15);
        }

        .password-strength-bar { 
            height: 5px; 
            width: 0%; 
            background: #222; 
            margin-top: 6px; 
            border-radius: 3px; 
            transition: all 0.4s ease; 
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem;
            transition: all 0.2s ease; 
            margin-top: 10px;
        }

        button:hover { 
            background: var(--primary-hover); 
            box-shadow: 0 0 20px rgba(255, 42, 42, 0.3); 
        }

        .divider { 
            margin: 24px 0; 
            color: #44444f; 
            font-size: 0.85rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #222; }
        
        .btn-google { 
            background: #ffffff; 
            color: #000000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            border: none; 
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-google img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
        .btn-google:hover { 
            background: #e6e6e6; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15); 
        }

        p.footer-text { margin-top: 25px; color: var(--text-muted); font-size: 0.9rem; }
        p.footer-text a { color: var(--primary); text-decoration: none; font-weight: bold; transition: color 0.2s; }
        p.footer-text a:hover { color: #ff5555; }
        
        .error-msg { color: var(--primary); font-size: 0.85rem; margin-top: 6px; display: none; font-weight: 500; }
        .success-msg { color: #00cc66; font-size: 0.85rem; margin-top: 6px; display: none; font-weight: 500; }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .auth-card { padding: 30px 20px; border: none; background: transparent; box-shadow: none; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="firebase-loader.js"></script>
</head>
<body>

    <div class="auth-card">
        <div class="brand">🦂 SCORPION PULSE</div>
        <div class="subtitle">Crea il tuo profilo musicale</div>
        
        <form id="register-form">
            <div class="input-group">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" placeholder="Scegli un nickname" required autocomplete="off">
                <div id="username-error" class="error-msg">❌ Questo username è già in uso!</div>
                <div id="username-success" class="success-msg">✨ Username disponibile!</div>
            </div>

            <div class="input-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="nome@esempio.com" required>
            </div>
            
            <div class="input-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Minimo 6 caratteri" required>
                <div id="strength-bar" class="password-strength-bar"></div>
            </div>

            <button type="submit">Registrati</button>
        </form>

        <div class="divider">oppure</div>

        <button class="btn-google" type="button" id="btn-google-click">
            <img src="logo_google.webp" alt="Google">
            Registrati con Google
        </button>

        <p class="footer-text">Hai già un account? <a href="login.html">Accedi qui</a></p>
    </div>

    <script>
        // CONTROLLO DI SICUREZZA SE IL FILE CONFIG NON È STATO CARICATO CORRETTAMENTE
        if (typeof firebase === 'undefined') {
            alert("Errore critico: Il file 'firebase-loader.js' non è configurato o non è stato trovato!");
        }

        const usernameInput = document.getElementById('reg-username');
        const passwordInput = document.getElementById('reg-password');
        const errorDiv = document.getElementById('username-error');
        const successDiv = document.getElementById('username-success');
        const barra = document.getElementById('strength-bar');
        const form = document.getElementById('register-form');

        // 1. GESTIONE DELLA BARRA DELLA PASSWORD (GRAFICA REATTIVA)
        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            if (val.length === 0) { 
                barra.style.width = "0%"; 
            } else if (val.length < 6) { 
                barra.style.background = "#ff2a2a"; 
                barra.style.width = "33%"; 
            } else if (val.length >= 6 && val.length < 10) { 
                barra.style.background = "#ff7300"; 
                barra.style.width = "66%"; 
            } else { 
                barra.style.background = "#00cc66"; 
                barra.style.width = "100%"; 
            }
        });

        // 2. CONTROLLO USERNAME SU FIRESTORE IN REAL TIME
        usernameInput.addEventListener('input', () => {
            const username = usernameInput.value.trim().toLowerCase();
            
            if (username.length < 3) {
                errorDiv.style.display = "none";
                successDiv.style.display = "none";
                usernameInput.style.borderColor = "var(--border)";
                return;
            }

            db.collection("users").where("username", "==", username).get()
                .then((querySnapshot) => {
                    if (!querySnapshot.empty) {
                        errorDiv.style.display = "block";
                        successDiv.style.display = "none";
                        usernameInput.style.borderColor = "var(--primary)";
                    } else {
                        errorDiv.style.display = "none";
                        successDiv.style.display = "block";
                        usernameInput.style.borderColor = "#00cc66";
                    }
                })
                .catch((err) => { 
                    console.error("Errore lettura database: ", err); 
                });
        });

        // 3. INVIO FORM REGISTRAZIONE SUL DATABASE REALE
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim().toLowerCase();
            const email = document.getElementById('reg-email').value;
            const password = passwordInput.value;

            if (errorDiv.style.display === "block") {
                alert("L'username scelto è già occupato! Scegline un altro.");
                return;
            }

            if (username.length < 3) {
                alert("L'username deve contenere almeno 3 caratteri!");
                return;
            }

            // Registrazione dell'utente in Firebase Authentication
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    // Creazione del database utente associato all'ID unico su Firestore
                    return db.collection("users").doc(user.uid).set({
                        username: username,
                        email: email,
                        searchHistory: [],
                        likedVideos: []
                    });
                })
                .then(() => {
                    alert("Registrazione completata su Scorpion Pulse! Verrai reindirizzato al login.");
                    window.location.href = "login.html";
                })
                .catch((error) => { 
                    alert("Errore Firebase: " + error.message); 
                });
        });

        // 4. PULSANTE DI ACCESSO RAPIDO GOOGLE AUTH
        document.getElementById('btn-google-click').addEventListener('click', () => {
            auth.signInWithPopup(provider)
                .then((result) => {
                    localStorage.setItem("usernameUtente", result.user.displayName);
                    window.location.href = "index.html";
                })
                .catch((err) => { 
                    console.warn("Popup chiusa o bloccata: ", err.message); 
                });
        });
    </script>
</body>
  </html>
