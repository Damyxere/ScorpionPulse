<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Pulse - Accedi</title>
    <style>
        :root {
            --bg-color: #070708;
            --card-bg: #121214;
            --primary: #ff2a2a;
            --primary-hover: #cc0000;
            --border: #222226;
            --text-muted: #888893;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at top left, rgba(255, 42, 42, 0.05), transparent 40%);
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        .auth-card { 
            background: var(--card-bg); 
            padding: 40px 30px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            box-sizing: border-box; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .brand { 
            font-size: 2.2rem; 
            font-weight: 900; 
            margin-bottom: 5px; 
            background: linear-gradient(45deg, #ff2a2a, #ff7300); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: 1px;
        }

        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 30px; }
        .input-group { text-align: left; margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            background: #070708; 
            color: white; 
            box-sizing: border-box; 
            font-size: 1rem; 
            transition: all 0.2s ease;
        }

        input:focus { 
            border-color: var(--primary); 
            outline: none; 
            box-shadow: 0 0 10px rgba(255, 42, 42, 0.15);
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem;
            margin-top: 10px;
            transition: all 0.2s ease;
        }

        button:hover { 
            background: var(--primary-hover); 
            box-shadow: 0 0 20px rgba(255, 42, 42, 0.3);
        }

        .divider { 
            margin: 24px 0; 
            color: #44444f; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #222; }
        
        .btn-google { 
            background: #ffffff; 
            color: #000000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            border: none; 
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-google:hover { 
            background: #e6e6e6; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        p.footer-text { margin-top: 25px; color: var(--text-muted); font-size: 0.9rem; }
        p.footer-text a { color: var(--primary); text-decoration: none; font-weight: bold; transition: color 0.2s; }
        p.footer-text a:hover { color: #ff5555; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script src="firebase-loader.js?v=2"></script>
</head>
<body>

    <div class="auth-card">
        <div class="brand">🦂 SCORPION PULSE</div>
        <div class="subtitle">Accedi alla tua area streaming</div>
        
        <form id="login-form">
            <div class="input-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="nome@esempio.com" required>
            </div>

            <div class="input-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="La tua password" required>
            </div>

            <button type="submit">Accedi</button>
        </form>

        <div class="divider">oppure</div>

        <button class="btn-google" type="button" id="btn-google-login">
            Accedi con Google
        </button>

        <p class="footer-text">Non hai un account? <a href="registrati.html">Registrati ora</a></p>
    </div>

    <script>
        console.log("Script Login Attivo.");
        const loginForm = document.getElementById('login-form');
        const googleBtn = document.getElementById('btn-google-login');

        if (loginForm) {
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                if (typeof auth === 'undefined') {
                    alert("Errore critico di inizializzazione.");
                    return;
                }

                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;

                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        localStorage.setItem("usernameUtente", userCredential.user.email);
                        window.location.href = "index.html";
                    })
                    .catch((err) => { 
                        console.error(err);
                        alert("Errore d'accesso: controlla i tuoi dati."); 
                    });
            });
        }

        if (googleBtn) {
            googleBtn.addEventListener('click', () => {
                if (typeof auth !== 'undefined' && typeof provider !== 'undefined') {
                    auth.signInWithPopup(provider)
                        .then((result) => {
                            localStorage.setItem("usernameUtente", result.user.displayName);
                            window.location.href = "index.html";
                        })
                        .catch((err) => { console.warn("Popup interrotto:", err.message); });
                }
            });
        }
    </script>
</body>
</html>
