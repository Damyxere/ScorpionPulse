<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Pulse - Mixtube Dashboard</title>
    <style>
        :root {
            --bg-color: #070708;
            --sidebar-bg: #121214;
            --card-bg: #1a1a1e;
            --primary: #ff2a2a;
            --primary-hover: #cc0000;
            --border: #222226;
            --text-muted: #888893;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRA LATERALE (SIDEBAR) */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .brand {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ff2a2a, #ff7300);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-align: center;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            background: transparent;
            color: #aaa;
            border: none;
            padding: 12px 15px;
            border-radius: 8px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .menu-btn:hover, .menu-btn.active {
            background: rgba(255, 42, 42, 0.1);
            color: var(--primary);
        }

        .user-profile {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .user-name {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-btn {
            background: #ff2a2a;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            width: 100%;
            transition: background 0.2s;
        }

        .logout-btn:hover { background: var(--primary-hover); }

        /* CONTENUTO PRINCIPALE */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        /* BARRA DI RICERCA LIVE STYLE MIXTUBE */
        .search-container {
            margin-bottom: 30px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 16px 20px;
            background: var(--sidebar-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 15px rgba(255, 42, 42, 0.2);
        }

        /* GRIGLIA VIDEO (RISULTATI DI RICERCA) */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            border-color: #333;
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Ratio 16:9 */
            background-size: cover;
            background-position: center;
        }

        .video-info {
            padding: 12px;
        }

        .video-title {
            font-size: 0.95rem;
            font-weight: bold;
            margin: 0 0 5px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        /* SEZIONE VIDEO PLAYER FISSO IN BASSO */
        .player-section {
            display: none;
            margin-top: auto;
            background: #121214;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            align-items: center;
            gap: 20px;
        }

        .player-container {
            width: 320px;
            height: 180px;
            border-radius: 8px;
            overflow: hidden;
        }

        .player-details {
            flex: 1;
        }

        .player-details h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .player-details p { margin: 0; color: var(--text-muted); font-size: 0.9rem; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="firebase-loader.js?v=2"></script>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="brand">🦂 SCORPION PULSE</div>
            <div class="menu-items">
                <button class="menu-btn active">🏠 Home / Mixtube</button>
                <button class="menu-btn">🔥 Trap & Drill Italia</button>
                <button class="menu-btn">❤️ Brani Preferiti</button>
            </div>
        </div>

        <div class="user-profile">
            <div class="user-name" id="display-user">Caricamento...</div>
            <button class="logout-btn" id="btn-logout">Esci</button>
        </div>
    </div>

    <div class="main-content">
        <div class="search-container">
            <input type="text" class="search-bar" id="search-input" placeholder="Cerca tracce, artisti o album drill/trap...">
        </div>

        <h2 id="section-title">Brani di Tendenza</h2>
        
        <div class="results-grid" id="results-container">
            </div>

        <div class="player-section" id="music-player">
            <div class="player-container">
                <iframe id="yt-iframe" width="100%" height="100%" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="player-details">
                <h3 id="player-title">Nessun brano in riproduzione</h3>
                <p id="player-author">Seleziona un video per avviarlo</p>
            </div>
        </div>
    </div>

    <script>
        // 1. GESTIONE UTENTE E LOGOUT
        if (typeof auth !== 'undefined') {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    // Mostra l'email o il nome salvato nel localStorage
                    document.getElementById('display-user').innerText = "👤 " + (user.email);
                } else {
                    // Se non è loggato, rimandalo alla pagina di login
                    window.location.href = "login.html";
                }
            });
        }

        document.getElementById('btn-logout').addEventListener('click', () => {
            if (typeof auth !== 'undefined') {
                auth.signOut().then(() => {
                    window.location.href = "login.html"; //
                });
            }
        });

        // 2. MOTORE DI RICERCA LIVE (TRAMITE FEED PUBBLICO RSS/NO-KEY YOUTUBE)
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('results-container');
        let timeoutRicerca = null;

        // Lista iniziale di tendenze Drill/Trap Italiane
        const trendIniziali = [
            { id: "46f3H5zXnZ8", title: "Sfera Ebbasta - Visiera A Becco" },
            { id: "pXq8Lw5_mBA", title: "Shiva, Sfera Ebbasta - Un Milione Di Volte" },
            { id: "b8_7E9hQv9s", title: "Skinny - Nuova Era" },
            { id: "3w8YmGZlY8A", title: "Geolier - I P' Me, Tu P' Te" }
        ];

        // Carica i video di default all'avvio
        function mostraTrend() {
            resultsContainer.innerHTML = "";
            trendIniziali.forEach(video => creaCardVideo(video.id, video.title));
        }
        mostraTrend();

        // Listener per la ricerca mentre l'utente scrive (Live)
        searchInput.addEventListener('input', () => {
            clearTimeout(timeoutRicerca);
            const query = searchInput.value.trim();

            if (query.length < 3) {
                if(query.length === 0) mostraTrend();
                return;
            }

            // Aspetta che l'utente si fermi 500ms prima di inviare la richiesta (ottimizzazione)
            timeoutRicerca = setTimeout(() => {
                eseguiRicercaLive(query);
            }, 500);
        });

        // Funzione di scraping sicura ed istantanea per i video senza usare chiavi API costose
        function eseguiRicercaLive(chiave) {
            document.getElementById('section-title').innerText = "Risultati per: " + chiave;
            resultsContainer.innerHTML = "<p style='color: #aaa;'>Ricerca tracce in corso...</p>";

            // Utilizziamo un motore di scomposizione pubblico per estrarre video da YouTube senza blocchi
            const url = `https://tools.aimylogic.com/api/googlesearch/search?query=site:youtube.com/watch ${encodeURIComponent(chiave)}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    resultsContainer.innerHTML = "";
                    let contatore = 0;

                    if(data && data.results) {
                        data.results.forEach(item => {
                            if (item.url.includes("watch?v=") && contatore < 8) {
                                const videoId = item.url.split("watch?v=")[1].split("&")[0];
                                creaCardVideo(videoId, item.title.replace(" - YouTube", ""));
                                contatore++;
                            }
                        });
                    }
                    if (contatore === 0) {
                        resultsContainer.innerHTML = "<p style='color: #ff2a2a;'>Nessun brano trovato. Riprova!</p>";
                    }
                })
                .catch(err => {
                    console.error("Errore ricerca:", err);
                    resultsContainer.innerHTML = "<p style='color: #ff2a2a;'>Errore di connessione live.</p>";
                });
        }

        // Crea graficamente gli elementi della lista in stile Mixtube
        function creaCardVideo(id, titolo) {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="video-thumbnail" style="background-image: url('https://img.youtube.com/vi/${id}/mqdefault.jpg')"></div>
                <div class="video-info">
                    <div class="video-title">${titolo}</div>
                </div>
            `;
            
            // Quando l'utente clicca sulla card, carica il video nel player fisso in basso
            card.addEventListener('click', () => {
                document.getElementById('music-player').style.display = 'flex';
                document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
                document.getElementById('player-title').innerText = titolo;
                document.getElementById('player-author').innerText = "In riproduzione su Scorpion Pulse";
            });

            resultsContainer.appendChild(card);
        }
    </script>
</body>
</html>
