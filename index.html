<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorpion Pulse - Player</title>
    <style>
        :root {
            --bg-main: #09090b;
            --bg-sidebar: #020203;
            --bg-card: #141417;
            --bg-card-hover: #1e1e24;
            --primary: #ff2a2a;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --player-bg: #0f0f11;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            flex-shrink: 0;
        }

        .brand { font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; }
        .brand span { color: var(--primary); }

        .menu-group { display: flex; flex-direction: column; gap: 8px; margin-top: 32px; }
        .menu-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: left;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            width: 100%;
        }
        .menu-btn:hover, .menu-btn.active { background: #18181b; color: var(--text-main); }
        .menu-btn.active { border-left: 3px solid var(--primary); border-radius: 0 8px 8px 0; }

        .user-panel { background: #141417; padding: 16px; border-radius: 12px; border: 1px solid var(--border); }
        .user-name { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .logout-btn { background: #27272a; color: var(--text-main); border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
        .logout-btn:hover { background: var(--primary); }

        .main-content { flex: 1; display: flex; flex-direction: column; padding: 32px 32px 160px 32px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .search-container { margin-bottom: 32px; max-width: 600px; width: 100%; }
        .search-bar { width: 100%; padding: 14px 24px; background: #141417; border: 1px solid var(--border); border-radius: 50px; color: white; font-size: 16px; }
        .search-bar:focus { border-color: var(--primary); outline: none; }

        h2 { font-size: 1.5rem; font-weight: 700; margin: 0 0 20px 0; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }

        .track-card { background: var(--bg-card); padding: 12px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .track-card:hover { background: var(--bg-card-hover); transform: translateY(-2px); }
        .track-cover { width: 100%; aspect-ratio: 1; background-size: cover; background-position: center; border-radius: 8px; margin-bottom: 10px; }
        .track-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 20px; }
        .track-artist { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .like-btn { position: absolute; bottom: 12px; right: 12px; background: transparent; border: none; color: var(--text-muted); font-size: 1.1rem; cursor: pointer; }
        .like-btn.liked { color: var(--primary); }

        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 100px; background: var(--player-bg); border-top: 1px solid var(--border); display: none; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 100; }
        .player-track-info { display: flex; align-items: center; gap: 12px; width: 30%; min-width: 180px; }
        .player-mini-cover { width: 48px; height: 48px; border-radius: 6px; background-size: cover; background-position: center; flex-shrink: 0; }
        .player-text-details { overflow: hidden; }
        .player-current-title { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-current-artist { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .player-controls { width: 40%; max-width: 450px; display: flex; justify-content: flex-end; }
        .yt-hidden-container { width: 200px; height: 45px; border-radius: 4px; overflow: hidden; }
        .yt-hidden-container iframe { width: 100%; height: 100%; border: none; }

        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: var(--bg-sidebar); border-top: 1px solid var(--border); justify-content: space-around; align-items: center; z-index: 99; }
        .mobile-nav-btn { background: transparent; border: none; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .mobile-nav-btn.active { color: var(--primary); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .main-content { padding: 16px 16px 180px 16px; }
            .results-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
            .player-bar { bottom: 60px; height: 120px; flex-direction: column; padding: 10px; justify-content: center; gap: 8px;}
            .player-track-info { width: 100%; justify-content: center; }
            .player-controls { width: 100%; justify-content: center; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="brand">🦂 Scorpion<span>Pulse</span></div>
            <div class="menu-group">
                <button class="menu-btn active" id="menu-dashboard">🎵 Dashboard</button>
                <button class="menu-btn" id="menu-favorites">💜 Preferiti</button>
            </div>
        </div>
        <div class="user-panel">
            <div class="user-name" id="display-user">Connessione...</div>
            <button class="logout-btn" id="btn-logout">Esci</button>
        </div>
    </div>

    <div class="main-content">
        <div class="search-container" id="search-box-wrapper">
            <input type="text" class="search-bar" id="search-input" placeholder="Cerca tracce o artisti...">
        </div>
        <h2 id="section-title">In Evidenza</h2>
        <div class="results-grid" id="results-container"></div>
    </div>

    <div class="mobile-nav">
        <button class="mobile-nav-btn active" id="m-menu-dashboard">🎵 <span>Home</span></button>
        <button class="mobile-nav-btn" id="m-menu-favorites">💜 <span>Preferiti</span></button>
        <button class="mobile-nav-btn" id="m-btn-logout">🚪 <span>Esci</span></button>
    </div>

    <div class="player-bar" id="player-bar">
        <div class="player-track-info">
            <div class="player-mini-cover" id="p-cover"></div>
            <div class="player-text-details">
                <div class="player-current-title" id="p-title">Scegli un brano</div>
                <div class="player-current-artist" id="p-artist">-</div>
            </div>
        </div>
        <div class="player-controls">
            <div class="yt-hidden-container" id="player-engine-target"></div>
        </div>
    </div>

    <script>
        let utenteCorrente = null;
        let preferitiIds = [];
        let modalitaCorrente = "dashboard";
        let timeoutRicerca = null;

        // Istanze stabili di riserva per evitare i blocchi CORS
        const istanzeRicerca = [
            "https://vid.puffyan.us",
            "https://invidious.projectsegfaut.space",
            "https://inv.tux.digital"
        ];

        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('results-container');
        const engineContainer = document.getElementById('player-engine-target');

        // Controllo della sessione utente
        if (window.auth) {
            window.auth.onAuthStateChanged((user) => {
                if (user) {
                    utenteCorrente = user;
                    document.getElementById('display-user').innerText = user.email;
                    caricaPreferitiUtente();
                } else {
                    window.location.href = "login.html";
                }
            });
        }

        const logoutAzione = () => { if (window.auth) { window.auth.signOut().then(() => { window.location.href = "login.html"; }); } };
        document.getElementById('btn-logout').addEventListener('click', logoutAzione);
        document.getElementById('m-btn-logout').addEventListener('click', logoutAzione);

        function eseguiRicerca(chiave, indexNode = 0) {
            if (indexNode >= istanzeRicerca.length) {
                resultsContainer.innerHTML = "<p style='color: var(--primary);'>Nessun catalogo disponibile. Riprova.</p>";
                return;
            }

            if (indexNode === 0) {
                document.getElementById('section-title').innerText = "Risultati per: " + chiave;
                resultsContainer.innerHTML = "<p style='color: var(--text-muted);'>Cerca brani...</p>";
            }

            fetch(`${istanzeRicerca[indexNode]}/api/v1/search?q=${encodeURIComponent(chiave)}&type=video`)
                .then(res => { if(!res.ok) throw new Error(); return res.json(); })
                .then(data => {
                    if (data && data.length > 0) {
                        resultsContainer.innerHTML = "";
                        data.slice(0, 24).forEach(video => {
                            creaCardBrano(video.videoId, video.title, video.author, `https://i.ytimg.com/vi/${video.videoId}/hqdefault.jpg`);
                        });
                    } else {
                        eseguiRicerca(chiave, indexNode + 1);
                    }
                })
                .catch(() => { eseguiRicerca(chiave, indexNode + 1); });
        }

        function caricaTopTracks() {
            if (modalitaCorrente !== "dashboard") return;
            eseguiRicerca("Skinny Shiva Sfera Rondodasosa");
            document.getElementById('section-title').innerText = "In Evidenza su Scorpion Pulse";
        }

        searchInput.addEventListener('input', () => {
            clearTimeout(timeoutRicerca);
            const query = searchInput.value.trim();
            if (query.length === 0) { caricaTopTracks(); return; }
            if (query.length < 2) return;
            timeoutRicerca = setTimeout(() => { if(modalitaCorrente === "dashboard") eseguiRicerca(query); }, 500);
        });

        function creaCardBrano(id, titolo, artista, copertinaUrl) {
            const card = document.createElement('div');
            card.className = 'track-card';
            const isLiked = preferitiIds.includes(String(id));
            
            card.innerHTML = `
                <div class="track-cover" style="background-image: url('${copertinaUrl}')"></div>
                <div class="track-title">${titolo}</div>
                <div class="track-artist">${artista}</div>
                <button class="like-btn ${isLiked ? 'liked' : ''}">${isLiked ? '💜' : '🤍'}</button>
            `;

            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('like-btn')) return;

                document.getElementById('player-bar').style.display = 'flex';
                document.getElementById('p-cover').style.backgroundImage = `url('${copertinaUrl}')`;
                document.getElementById('p-title').innerText = titolo;
                document.getElementById('p-artist').innerText = artista;

                // RIPRODUZIONE SENZA BLOCCO DEI 39 SECONDI
                engineContainer.innerHTML = `
                    <iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&controls=1&modestbranding=1" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                    </iframe>`;
            });

            const btnLike = card.querySelector('.like-btn');
            btnLike.addEventListener('click', (e) => {
                e.stopPropagation();
                gestisciLikeBrano(id, titolo, artista, copertinaUrl, btnLike);
            });

            resultsContainer.appendChild(card);
        }

        function caricaPreferitiUtente() {
            if (!window.db || !utenteCorrente) return;
            window.db.collection("users").doc(utenteCorrente.uid).collection("favorites")
                .onSnapshot((snapshot) => {
                    preferitiIds = [];
                    snapshot.forEach(doc => preferitiIds.push(String(doc.id)));
                    if (modalitaCorrente === "preferiti") mostraSchermataPreferiti();
                });
        }

        function gestisciLikeBrano(id, titolo, artista, copertinaUrl, bottone) {
            if (!utenteCorrente || !window.db) return;
            const docRef = window.db.collection("users").doc(utenteCorrente.uid).collection("favorites").doc(String(id));

            if (preferitiIds.includes(String(id))) {
                docRef.delete().then(() => { bottone.classList.remove('liked'); bottone.innerText = "🤍"; });
            } else {
                docRef.set({
                    id: id, title: titolo, artist: artista, coverUrl: copertinaUrl,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => { bottone.classList.add('liked'); bottone.innerText = "💜"; });
            }
        }

        function mostraSchermataPreferiti() {
            document.getElementById('section-title').innerText = "I tuoi Preferiti 💜";
            resultsContainer.innerHTML = "";
            if (preferitiIds.length === 0) {
                resultsContainer.innerHTML = "<p style='color: var(--text-muted);'>Nessun brano salvato.</p>";
                return;
            }
            window.db.collection("users").doc(utenteCorrente.uid).collection("favorites").orderBy("timestamp", "desc").get()
                .then(snapshot => {
                    if (modalitaCorrente !== "preferiti") return;
                    resultsContainer.innerHTML = "";
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        creaCardBrano(data.id, data.title, data.artist, data.coverUrl);
                    });
                });
        }

        const attivaDashboard = () => {
            modalitaCorrente = "dashboard";
            document.querySelectorAll('#menu-dashboard, #m-menu-dashboard').forEach(b => b.classList.add('active'));
            document.querySelectorAll('#menu-favorites, #m-menu-favorites').forEach(b => b.classList.remove('active'));
            document.getElementById('search-box-wrapper').style.display = "block";
            caricaTopTracks();
        };

        const attivaPreferiti = () => {
            modalitaCorrente = "preferiti";
            document.querySelectorAll('#menu-dashboard, #m-menu-dashboard').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('#menu-favorites, #m-menu-favorites').forEach(b => b.classList.add('active'));
            document.getElementById('search-box-wrapper').style.display = "none";
            mostraSchermataPreferiti();
        };

        document.getElementById('menu-dashboard').addEventListener('click', attivaDashboard);
        document.getElementById('m-menu-dashboard').addEventListener('click', attivaDashboard);
        document.getElementById('menu-favorites').addEventListener('click', attivaPreferiti);
        document.getElementById('m-menu-favorites').addEventListener('click', attivaPreferiti);

        setTimeout(() => { caricaTopTracks(); }, 1000);
    </script>
</body>
</html>
