<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorpion Pulse - Player</title>
    <style>
        :root {
            --bg-main: #050507;
            --bg-sidebar: #09090b;
            --bg-card: #121214;
            --bg-card-hover: #1a1a1e;
            --primary: #ff2a2a;
            --primary-glow: rgba(255, 42, 42, 0.25);
            --text-main: #f4f4f5;
            --text-muted: #71717a;
            --border: #1f1f23;
            --player-bg: #0c0c0e;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.02em;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 32px 24px;
            flex-shrink: 0;
        }

        .brand { 
            font-size: 1.5rem; 
            font-weight: 900; 
            letter-spacing: 0.5px; 
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--primary-glow);
        }
        .brand span { color: var(--primary); }

        .menu-group { display: flex; flex-direction: column; gap: 6px; margin-top: 40px; }
        .menu-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 14px 18px;
            border-radius: 10px;
            text-align: left;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu-btn:hover {
            color: var(--text-main);
            background: #141417;
        }
        .menu-btn.active { 
            background: var(--primary); 
            color: #ffffff;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .user-panel { 
            background: #141417; 
            padding: 18px; 
            border-radius: 14px; 
            border: 1px solid var(--border); 
        }
        .user-name { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            margin-bottom: 14px; 
            text-align: center; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap;
            font-weight: 500;
        }
        .logout-btn { 
            background: #27272a; 
            color: var(--text-main); 
            border: none; 
            padding: 10px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 700; 
            width: 100%; 
            transition: background 0.2s;
        }
        .logout-btn:hover { background: var(--primary); color: white; }

        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 40px 40px 160px 40px; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .search-container { margin-bottom: 40px; max-width: 640px; width: 100%; }
        .search-bar { 
            width: 100%; 
            padding: 16px 28px; 
            background: #0e0e11; 
            border: 1px solid var(--border); 
            border-radius: 14px; 
            color: white; 
            font-size: 16px; 
            transition: all 0.2s ease;
        }
        .search-bar:focus { 
            border-color: var(--primary); 
            outline: none; 
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: #141417;
        }

        h2 { font-size: 1.7rem; font-weight: 800; margin: 0 0 24px 0; letter-spacing: -0.03em; }
        
        .results-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
        }

        .track-card { 
            background: var(--bg-card); 
            padding: 14px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            cursor: pointer; 
            position: relative; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .track-card:hover { 
            background: var(--bg-card-hover); 
            transform: translateY(-4px); 
            border-color: #2e2e35;
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
        }
        .track-cover { 
            width: 100%; 
            aspect-ratio: 1; 
            background-size: cover; 
            background-position: center; 
            border-radius: 10px; 
            margin-bottom: 14px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .track-title { 
            font-size: 0.95rem; 
            font-weight: 700; 
            margin-bottom: 6px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            padding-right: 24px; 
        }
        .track-artist { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            font-weight: 500;
        }

        .like-btn { 
            position: absolute; 
            bottom: 14px; 
            right: 14px; 
            background: transparent; 
            border: none; 
            color: var(--text-muted); 
            font-size: 1.2rem; 
            cursor: pointer; 
            transition: transform 0.2s;
        }
        .like-btn:hover { transform: scale(1.2); }
        .like-btn.liked { color: var(--primary); }

        .player-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            height: 110px; 
            background: rgba(12, 12, 14, 0.85); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); 
            display: none; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 32px; 
            z-index: 100; 
        }
        .player-track-info { display: flex; align-items: center; gap: 16px; width: 35%; min-width: 220px; }
        .player-mini-cover { width: 56px; height: 56px; border-radius: 10px; background-size: cover; background-position: center; flex-shrink: 0; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .player-text-details { overflow: hidden; }
        .player-current-title { font-size: 0.95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .player-current-artist { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .player-controls { width: 45%; max-width: 480px; display: flex; justify-content: flex-end; }
        .yt-hidden-container { width: 240px; height: 50px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        .yt-hidden-container iframe { width: 100%; height: 100%; border: none; }

        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: rgba(9, 9, 11, 0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border); justify-content: space-around; align-items: center; z-index: 99; }
        .mobile-nav-btn { background: transparent; border: none; color: var(--text-muted); font-size: 0.85rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .mobile-nav-btn.active { color: var(--primary); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .main-content { padding: 24px 24px 200px 24px; }
            .results-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
            .player-bar { bottom: 64px; height: 130px; flex-direction: column; padding: 14px; justify-content: center; gap: 12px;}
            .player-track-info { width: 100%; justify-content: center; text-align: center; }
            .player-controls { width: 100%; justify-content: center; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-loader.js"></script>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="brand">🦂 Scorpion<span>Pulse</span></div>
            <div class="menu-group">
                <button class="menu-btn active" id="menu-dashboard"><span>🎵</span> Dashboard</button>
                <button class="menu-btn" id="menu-favorites"><span>💜</span> Preferiti</button>
            </div>
        </div>
        <div class="user-panel">
            <div class="user-name" id="display-user">Connessione...</div>
            <button class="logout-btn" id="btn-logout">Esci</button>
        </div>
    </div>

    <div class="main-content">
        <div class="search-container" id="search-box-wrapper">
            <input type="text" class="search-bar" id="search-input" placeholder="Cerca tracce, artisti, drill, trap...">
        </div>
        <h2 id="section-title">In Evidenza</h2>
        <div class="results-grid" id="results-container"></div>
    </div>

    <div class="mobile-nav">
        <button class="mobile-nav-btn active" id="m-menu-dashboard">🎵 <span>Home</span></button>
        <button class="mobile-nav-btn" id="m-menu-favorites">💜 <span>Preferiti</span></button>
        <button class="mobile-nav-btn" id="m-btn-logout">🚪 <span>Esci</span></button>
    </div>

    <div class="player-bar" id="player-bar">
        <div class="player-track-info">
            <div class="player-mini-cover" id="p-cover"></div>
            <div class="player-text-details">
                <div class="player-current-title" id="p-title">Scegli un brano</div>
                <div class="player-current-artist" id="p-artist">-</div>
            </div>
        </div>
        <div class="player-controls">
            <div class="yt-hidden-container" id="player-engine-target"></div>
        </div>
    </div>

    <script>
        let utenteCorrente = null;
        let preferitiIds = [];
        let modalitaCorrente = "dashboard";
        let timeoutRicerca = null;

        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('results-container');
        const engineContainer = document.getElementById('player-engine-target');

        // Nodi Invidious pubblici stabili con CORS sbloccato
        const nodiInvidious = [
            "https://inv.tux.digital",
            "https://invidious.projectsegfaut.space",
            "https://vid.puffyan.us",
            "https://invidious.perennialte.ch"
        ];

        if (window.auth) {
            window.auth.onAuthStateChanged((user) => {
                if (user) {
                    utenteCorrente = user;
                    document.getElementById('display-user').innerText = user.email;
                    caricaPreferitiUtente();
                } else {
                    window.location.href = "login.html";
                }
            });
        }

        const logoutAzione = () => { if (window.auth) { window.auth.signOut().then(() => { window.location.href = "login.html"; }); } };
        document.getElementById('btn-logout').addEventListener('click', logoutAzione);
        document.getElementById('m-btn-logout').addEventListener('click', logoutAzione);

        // FUNZIONE DI RICERCA A CATENA (PROVA UN NODO ALLA VOLTA IN AUTOMATICO)
        function eseguiRicerca(chiave, nodoIndex = 0) {
            if (nodoIndex === 0) {
                document.getElementById('section-title').innerText = "Risultati per: " + chiave;
                resultsContainer.innerHTML = "<p style='color: var(--text-muted);'>Connessione al network musicale...</p>";
            }

            if (nodoIndex >= nodiInvidious.length) {
                resultsContainer.innerHTML = "<p style='color: var(--primary);'>Tutti i nodi sono momentaneamente carichi. Riprova tra un attimo.</p>";
                return;
            }

            const urlConfigurato = `${nodiInvidious[nodoIndex]}/api/v1/search?q=${encodeURIComponent(chiave)}&type=video`;

            fetch(urlConfigurato)
                .then(res => { if (!res.ok) throw new Error(); return res.json(); })
                .then(data => {
                    if (data && data.length > 0) {
                        resultsContainer.innerHTML = "";
                        data.slice(0, 24).forEach(video => {
                            creaCardBrano(video.videoId, video.title, video.author, `https://i.ytimg.com/vi/${video.videoId}/hqdefault.jpg`);
                        });
                    } else {
                        eseguiRicerca(chiave, nodoIndex + 1);
                    }
                })
                .catch(() => {
                    console.log(`Nodo ${nodoIndex} fallito. Switch sul prossimo...`);
                    eseguiRicerca(chiave, nodoIndex + 1);
                });
        }

        function caricaTopTracks() {
            if (modalitaCorrente !== "dashboard") return;
            eseguiRicerca("Skinny Shiva Sfera Rondodasosa", 0);
            document.getElementById('section-title').innerText = "In Evidenza su Scorpion Pulse";
        }

        searchInput.addEventListener('input', () => {
            clearTimeout(timeoutRicerca);
            const query = searchInput.value.trim();
            if (query.length === 0) { caricaTopTracks(); return; }
            if (query.length < 2) return;
            timeoutRicerca = setTimeout(() => { if(modalitaCorrente === "dashboard") eseguiRicerca(query, 0); }, 600);
        });

        function creaCardBrano(id, titolo, artista, copertinaUrl) {
            const card = document.createElement('div');
            card.className = 'track-card';
            const isLiked = preferitiIds.includes(String(id));
            
            card.innerHTML = `
                <div class="track-cover" style="background-image: url('${copertinaUrl}')"></div>
                <div class="track-title">${titolo}</div>
                <div class="track-artist">${artista}</div>
                <button class="like-btn ${isLiked ? 'liked' : ''}">${isLiked ? '💜' : '🤍'}</button>
            `;

            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('like-btn')) return;

                document.getElementById('player-bar').style.display = 'flex';
                document.getElementById('p-cover').style.backgroundImage = `url('${copertinaUrl}')`;
                document.getElementById('p-title').innerText = titolo;
                document.getElementById('p-artist').innerText = artista;

                engineContainer.innerHTML = `
                    <iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&controls=1&modestbranding=1" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                    </iframe>`;
            });

            const btnLike = card.querySelector('.like-btn');
            btnLike.addEventListener('click', (e) => {
                e.stopPropagation();
                gestisciLikeBrano(id, titolo, artista, copertinaUrl, btnLike);
            });

            resultsContainer.appendChild(card);
        }

        function caricaPreferitiUtente() {
            if (!window.db || !utenteCorrente) return;
            window.db.collection("users").doc(utenteCorrente.uid).collection("favorites")
                .onSnapshot((snapshot) => {
                    preferitiIds = [];
                    snapshot.forEach(doc => preferitiIds.push(String(doc.id)));
                    if (modalitaCorrente === "preferiti") mostraSchermataPreferiti();
                });
        }

        function gestisciLikeBrano(id, titolo, artista, copertinaUrl, bottone) {
            if (!utenteCorrente || !window.db) return;
            const docRef = window.db.collection("users").doc(utenteCorrente.uid).collection("favorites").doc(String(id));

            if (preferitiIds.includes(String(id))) {
                docRef.delete().then(() => { bottone.classList.remove('liked'); bottone.innerText = "🤍"; });
            } else {
                docRef.set({
                    id: id, title: titolo, artist: artista, coverUrl: copertinaUrl,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => { bottone.classList.add('liked'); bottone.innerText = "💜"; });
            }
        }

        function mostraSchermataPreferiti() {
            document.getElementById('section-title').innerText = "I tuoi Preferiti 💜";
            resultsContainer.innerHTML = "";
            if (preferitiIds.length === 0) {
                resultsContainer.innerHTML = "<p style='color: var(--text-muted); padding: 10px;'>Nessun brano salvato nei tuoi preferiti.</p>";
                return;
            }
            window.db.collection("users").doc(utenteCorrente.uid).collection("favorites").orderBy("timestamp", "desc").get()
                .then(snapshot => {
                    if (modalitaCorrente !== "preferiti") return;
                    resultsContainer.innerHTML = "";
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        creaCardBrano(data.id, data.title, data.artist, data.coverUrl);
                    });
                });
        }

        const attivaDashboard = () => {
            modalitaCorrente = "dashboard";
            document.querySelectorAll('#menu-dashboard, #m-menu-dashboard').forEach(b => b.classList.add('active'));
            document.querySelectorAll('#menu-favorites, #m-menu-favorites').forEach(b => b.classList.remove('active'));
            document.getElementById('search-box-wrapper').style.display = "block";
            caricaTopTracks();
        };

        const attivaPreferiti = () => {
            modalitaCorrente = "preferiti";
            document.querySelectorAll('#menu-dashboard, #m-menu-dashboard').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('#menu-favorites, #m-menu-favorites').forEach(b => b.classList.add('active'));
            document.getElementById('search-box-wrapper').style.display = "none";
            mostraSchermataPreferiti();
        };

        document.getElementById('menu-dashboard').addEventListener('click', attivaDashboard);
        document.getElementById('m-menu-dashboard').addEventListener('click', attivaDashboard);
        document.getElementById('menu
